name: Publish
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Build app
        working-directory: desktop-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      - name: Sign installer for updater
        working-directory: desktop-tauri
        shell: pwsh
        run: |
          $NSIS = Get-Item "src-tauri\target\release\bundle\nsis\*.exe" | Select-Object -First 1
          npx tauri signer sign --password "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" "$($NSIS.FullName)"

      - name: Generate update JSON
        working-directory: desktop-tauri
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}" -replace '^v', ''
          $NSIS = Get-Item "src-tauri\target\release\bundle\nsis\*.exe" | Select-Object -First 1
          $SIG = Get-Item "src-tauri\target\release\bundle\nsis\*.sig" | Select-Object -First 1
          $SIGNATURE = (Get-Content $SIG.FullName -Raw).Trim()
          
          $json = @{
            version = $VERSION
            notes = ""
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $SIGNATURE
                url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$($NSIS.Name)"
              }
            }
          }
          $json | ConvertTo-Json -Depth 10 | Set-Content "update-windows-x86_64.json"
          Write-Output "Update JSON generated for version $VERSION"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop-tauri/src-tauri/target/release/bundle/msi/*.msi
            desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe
            desktop-tauri/src-tauri/target/release/bundle/nsis/*.sig
            desktop-tauri/update-windows-x86_64.json